<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Painel • Timer</title>

    <style>
      :root{
        --bg0:#070A12;
        --bg1:#0B1630;
        --stroke: rgba(255,255,255,.14);
        --stroke2: rgba(255,255,255,.22);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.65);
        --shadow: 0 18px 60px rgba(0,0,0,.55);
        --shadow2: 0 10px 30px rgba(0,0,0,.35);
        --radius: 18px;
        --radius2: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        --yellow: #fbbf24;
        --green: #34d399;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family: var(--sans);
        color: var(--text);
        background: linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow-x:hidden;
      }
      body[data-theme="aurora"]{
        background:
          radial-gradient(1100px 650px at 15% 10%, rgba(16,185,129,.35), transparent 58%),
          radial-gradient(900px 540px at 90% 18%, rgba(59,130,246,.32), transparent 55%),
          radial-gradient(700px 460px at 70% 88%, rgba(236,72,153,.18), transparent 62%),
          linear-gradient(180deg, #050915, #0B1636);
      }
      body[data-theme="sunset"]{
        background:
          radial-gradient(1100px 650px at 18% 12%, rgba(249,115,22,.32), transparent 58%),
          radial-gradient(900px 540px at 88% 22%, rgba(124,58,237,.26), transparent 55%),
          radial-gradient(700px 460px at 60% 88%, rgba(34,211,238,.14), transparent 62%),
          linear-gradient(180deg, #0B0613, #1C1232);
      }
      body[data-theme="midnight"]{
        background:
          radial-gradient(1100px 650px at 25% 8%, rgba(99,102,241,.26), transparent 58%),
          radial-gradient(900px 540px at 85% 20%, rgba(34,211,238,.22), transparent 55%),
          radial-gradient(700px 460px at 65% 88%, rgba(16,185,129,.16), transparent 62%),
          linear-gradient(180deg, #040713, #0B1630);
      }
      body[data-theme="mono"]{
        background:
          radial-gradient(1100px 650px at 15% 10%, rgba(255,255,255,.10), transparent 58%),
          radial-gradient(900px 540px at 90% 18%, rgba(255,255,255,.08), transparent 55%),
          radial-gradient(700px 460px at 70% 90%, rgba(255,255,255,.06), transparent 62%),
          linear-gradient(180deg, #05060A, #0A0B12);
      }

      .app{min-height:100vh;padding:22px 18px 40px}
      .topbar{
        display:flex;align-items:center;justify-content:space-between;gap:14px;
        max-width:1280px;margin:0 auto 16px;
      }
      .brand{display:flex;align-items:center;gap:12px}
      .logo{
        width:42px;height:42px;border-radius:14px;
        background: radial-gradient(18px 18px at 30% 25%, rgba(255,255,255,.35), transparent 60%),
          linear-gradient(135deg, rgba(249,115,22,.95), rgba(251,191,36,.9));
        box-shadow:0 14px 40px rgba(249,115,22,.35);
        border:1px solid rgba(255,255,255,.22);
        position:relative;overflow:hidden;
      }
      .logo:after{
        content:"";position:absolute;top:-30%;left:-30%;width:120%;height:120%;
        background:conic-gradient(from 180deg, rgba(255,255,255,.0), rgba(255,255,255,.35), rgba(255,255,255,.0));
        transform:rotate(12deg);
        animation:spinGlow 5.5s linear infinite;opacity:.8;
      }
      @keyframes spinGlow{to{transform:rotate(372deg)}}
      .brand h1{margin:0;font-size:15px;letter-spacing:.2px;font-weight:750;line-height:1.1}
      .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}

      .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .pill{
        border:1px solid var(--stroke);
        background:rgba(255,255,255,.05);
        border-radius:999px;padding:10px 12px;
        display:flex;gap:10px;align-items:center;
        box-shadow:var(--shadow2);
        backdrop-filter:blur(10px);
      }
      .pill label{font-size:12px;color:var(--muted)}
      select{background:transparent;border:none;color:var(--text);outline:none;font-weight:650}
      option{background:#0b0d16}

      .btn{
        cursor:pointer;
        border:1px solid var(--stroke);
        background:rgba(255,255,255,.05);
        color:var(--text);
        padding:10px 12px;
        border-radius:12px;
        font-weight:720;
        transition:transform .15s ease, background .2s ease, border-color .2s ease;
        backdrop-filter:blur(10px);
        box-shadow:var(--shadow2);
        user-select:none;
      }
      .btn:hover{transform:translateY(-1px);border-color:var(--stroke2);background:rgba(255,255,255,.08)}
      .btn:active{transform:translateY(0px) scale(.99)}
      .btn.primary{border-color:rgba(249,115,22,.35);background:linear-gradient(135deg, rgba(124,58,237,.30), rgba(249,115,22,.20));}

      .grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:14px}
      .col{display:flex;flex-direction:column;gap:14px}

      .card{
        border-radius:var(--radius);
        background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
        border:1px solid rgba(255,255,255,.12);
        box-shadow:var(--shadow);
        backdrop-filter:blur(14px);
        overflow:hidden;
      }
      .card .hd{
        padding:14px 16px 10px;
        display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
        border-bottom:1px solid rgba(255,255,255,.08);
        background:rgba(255,255,255,.02);
      }
      .card .hd h2{margin:0;font-size:13px;letter-spacing:.25px;text-transform:uppercase;color:rgba(255,255,255,.84)}
      .card .hd .sub{margin-top:4px;font-size:12px;color:var(--muted)}
      .card .bd{padding:14px 16px 16px}

      .fadeIn{animation:fadeInUp .55s cubic-bezier(.2,.8,.2,1) both}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

      .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      @media (max-width:760px){.row2{grid-template-columns:1fr}}

      .clock{border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.16);padding:12px}
      .timebig{font-family:var(--mono);font-size:32px;font-weight:900;letter-spacing:.5px}
      .timehint{color:var(--muted);font-size:12px;margin-top:6px}
      .controls2{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center}
      .controls2 input{background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;color:var(--text);outline:none;font-family:var(--mono);width:160px}
      .controls2 input:focus{border-color:rgba(34,211,238,.45);box-shadow:0 0 0 3px rgba(34,211,238,.15)}

      .navTop{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .navLink{
        text-decoration:none;
        color:var(--muted);
        border:1px solid rgba(255,255,255,.12);
        background:rgba(255,255,255,.03);
        padding:8px 10px;
        border-radius:12px;
        font-weight:700;
      }
      .navLink.active{color:var(--text);border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.10)}

      .toast{position:fixed;right:18px;bottom:18px;padding:12px 14px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:14px;box-shadow:var(--shadow);backdrop-filter:blur(10px);color:var(--text);transform:translateY(12px);opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;max-width:360px}
      .toast.show{opacity:1;transform:translateY(0)}

      button:focus,.key:focus,input:focus,select:focus{outline:none}
    </style>
  </head>

  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1>Blackbox Dashboard</h1>
            <p>Timer/Cronômetro</p>
          </div>
        </div>

        <div class="controls">
          <div class="pill">
            <label for="themeSel">Tema</label>
            <select id="themeSel" aria-label="Tema de fundo">
              <option value="aurora">Aurora</option>
              <option value="sunset">Sunset</option>
              <option value="midnight">Midnight</option>
              <option value="mono">Mono</option>
            </select>
          </div>

          <div class="navTop" aria-label="Navegação">
            <a class="btn" href="../index.html" style="text-decoration:none">🏠 Início</a>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="col">
          <section class="card fadeIn" style="animation-delay:0ms">
            <div class="hd">
              <div>
                <h2>Timer & Cronômetro</h2>
                <div class="sub">HH:MM:SS • Persistência local • Alarmes visuais.</div>
              </div>
              <div class="seg"><div class="tag">Dica: <span style="font-family:var(--mono)">Espaço</span> pausa/recomeça cronômetro</div></div>
            </div>

            <div class="bd">
              <div class="row2">
                <div class="clock">
                  <div class="timebig" id="chronoDisplay">00:00:00</div>
                  <div class="timehint" id="chronoHint">Cronômetro rodando</div>
                  <div class="controls2">
                    <button class="btn" style="padding:10px 12px" id="chronoStart">Iniciar</button>
                    <button class="btn" style="padding:10px 12px" id="chronoPause">Pausar</button>
                    <button class="btn" style="padding:10px 12px" id="chronoReset">Reset</button>
                  </div>
                </div>

                <div class="clock">
                  <div class="timebig" id="timerDisplay">00:10:00</div>
                  <div class="timehint" id="timerHint">Defina o tempo regressivo e dê start.</div>
                  <div class="controls2">
                    <input id="timerInput" inputmode="numeric" placeholder="HH:MM:SS" value="00:10:00" />
                    <button class="btn" style="padding:10px 12px" id="timerStart">Start</button>
                    <button class="btn" style="padding:10px 12px" id="timerPause">Pausar</button>
                    <button class="btn" style="padding:10px 12px" id="timerResume">Despausar</button>
                    <button class="btn" style="padding:10px 12px" id="timerReset">Reset</button>
                  </div>
                </div>

              </div>
            </div>
          </section>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <script>
      const $ = (sel, root=document) => root.querySelector(sel);

      function toast(msg, ms=1800){
        const el = $('#toast');
        if(!el) return;
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(()=>el.classList.remove('show'), ms);
      }

      const themeSel = $('#themeSel');
      function applyTheme(theme){
        document.body.dataset.theme = theme;
        try{ localStorage.setItem('bb_theme', theme); }catch{}
      }
      (function initTheme(){
        let t = 'aurora';
        try{ t = localStorage.getItem('bb_theme') || 'aurora'; }catch{}
        if(themeSel) themeSel.value = t;
        applyTheme(t);
      })();
      themeSel?.addEventListener('change', (e)=> applyTheme(e.target.value));

      function pad2(n){return String(n).padStart(2,'0')}
      function formatHMS(ms){
        const total = Math.max(0, Math.floor(ms/1000));
        const h = Math.floor(total/3600);
        const m = Math.floor((total%3600)/60);
        const s = total%60;
        return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
      }
      function parseHMS(str){
        const m = String(str||'').trim().match(/^(\d{1,2}):(\d{1,2}):(\d{1,2})$/);
        if(!m) return null;
        const h = Number(m[1]);
        const mi = Number(m[2]);
        const s = Number(m[3]);
        if(mi>59 || s>59) return null;
        return (h*3600 + mi*60 + s)*1000;
      }

      const chronoDisplay = $('#chronoDisplay');
      const chronoHint = $('#chronoHint');
      const timerDisplay = $('#timerDisplay');
      const timerHint = $('#timerHint');
      let chronoStartTime = null;
      let chronoElapsed = 0;
      let chronoRunning = false;
      let timerStartTime = null;
      let timerDuration = 0;
      let timerRunning = false;

      function persistTimers(){
        try{
          localStorage.setItem('bb_chrono', JSON.stringify({
            chronoStartTime, chronoElapsed, chronoRunning,
            timerStartTime, timerDuration, timerRunning
          }));
        }catch{}
      }
      function loadTimers(){
        try{
          const t = localStorage.getItem('bb_chrono');
          if(!t) return;
          const data = JSON.parse(t);
          chronoStartTime = data.chronoStartTime;
          chronoElapsed = data.chronoElapsed;
          chronoRunning = data.chronoRunning;
          timerStartTime = data.timerStartTime;
          timerDuration = data.timerDuration;
          timerRunning = data.timerRunning;
        }catch{}
      }

      function updateChronoUI(){
        if(!chronoDisplay || !chronoHint) return;
        const now = Date.now();
        let displayTime = chronoElapsed;
        if(chronoRunning && chronoStartTime) displayTime += (now - chronoStartTime);
        chronoDisplay.textContent = formatHMS(displayTime);
        if(chronoRunning){
          chronoHint.textContent = 'Cronômetro rodando';
          $('#chronoStart').disabled = true;
          $('#chronoPause').disabled = false;
          $('#chronoReset').disabled = false;
        } else {
          chronoHint.textContent = 'Cronômetro pausado';
          $('#chronoStart').disabled = false;
          $('#chronoPause').disabled = true;
          $('#chronoReset').disabled = (chronoElapsed===0);
        }
      }
      function updateTimerUI(){
        if(!timerDisplay || !timerHint) return;
        const now = Date.now();
        let remaining = timerDuration;
        if(timerRunning && timerStartTime) remaining -= (now - timerStartTime);
        timerDisplay.textContent = formatHMS(remaining);
        const startBtn = $('#timerStart');
        const pauseBtn = $('#timerPause');
        const resumeBtn = $('#timerResume');
        const resetBtn = $('#timerReset');
        if(timerRunning){
          timerHint.textContent = 'Timer rodando';
          startBtn.disabled = true;
          pauseBtn.disabled = false;
          resumeBtn.disabled = true;
          resetBtn.disabled = false;
        } else {
          timerHint.textContent = 'Timer pausado';
          startBtn.disabled = false;
          pauseBtn.disabled = true;
          resumeBtn.disabled = (remaining<=0);
          resetBtn.disabled = (remaining===0);
        }
      }

      function startChrono(){
        if(chronoRunning) return;
        chronoStartTime = Date.now();
        chronoRunning = true;
        persistTimers();
        updateChronoUI();
      }
      function pauseChrono(){
        if(!chronoRunning) return;
        chronoElapsed += (Date.now() - chronoStartTime);
        chronoStartTime = null;
        chronoRunning = false;
        persistTimers();
        updateChronoUI();
      }
      function resetChrono(){
        chronoStartTime = null;
        chronoElapsed = 0;
        chronoRunning = false;
        persistTimers();
        updateChronoUI();
      }

      function startTimer(){
        if(timerRunning) return;
        const dur = parseHMS($('#timerInput').value);
        if(dur===null){ toast('Formato inválido. Use HH:MM:SS'); return; }
        timerDuration = dur;
        timerStartTime = Date.now();
        timerRunning = true;
        persistTimers();
        updateTimerUI();
      }
      function pauseTimer(){
        if(!timerRunning) return;
        timerDuration -= (Date.now() - timerStartTime);
        timerStartTime = null;
        timerRunning = false;
        persistTimers();
        updateTimerUI();
      }
      function resumeTimer(){
        if(timerRunning) return;
        if(timerDuration<=0) return;
        timerStartTime = Date.now();
        timerRunning = true;
        persistTimers();
        updateTimerUI();
      }
      function resetTimer(){
        timerStartTime = null;
        timerDuration = 0;
        timerRunning = false;
        persistTimers();
        updateTimerUI();
      }

      $('#chronoStart')?.addEventListener('click', startChrono);
      $('#chronoPause')?.addEventListener('click', pauseChrono);
      $('#chronoReset')?.addEventListener('click', resetChrono);
      $('#timerStart')?.addEventListener('click', startTimer);
      $('#timerPause')?.addEventListener('click', pauseTimer);
      $('#timerResume')?.addEventListener('click', resumeTimer);
      $('#timerReset')?.addEventListener('click', resetTimer);

      document.addEventListener('keydown', (e)=>{
        if(e.code==='Space' && !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)){
          if(chronoRunning) pauseChrono(); else startChrono();
          e.preventDefault();
        }
      });

      function tick(){
        updateChronoUI();
        updateTimerUI();
        setTimeout(()=>requestAnimationFrame(tick), 250);
      }
      tick();

      loadTimers();
      updateChronoUI();
      updateTimerUI();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
<title>X-organization • Notas</title>

    <style>
      :root{
        --bg0:#070A12;
        --bg1:#0B1630;
        --stroke: rgba(255,255,255,.14);
        --stroke2: rgba(255,255,255,.22);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.65);
        --shadow: 0 18px 60px rgba(0,0,0,.55);
        --shadow2: 0 10px 30px rgba(0,0,0,.35);
        --radius: 18px;
        --radius2: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        --yellow: #fbbf24;
        --green: #34d399;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family: var(--sans);
        color: var(--text);
        background: linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow-x:hidden;
      }
      body[data-theme="aurora"]{
        background:
          radial-gradient(1100px 650px at 15% 10%, rgba(0, 0, 0, 0), transparent 58%),
          radial-gradient(900px 540px at 90% 18%, rgba(47, 0, 255, 0), transparent 55%),
          radial-gradient(1000px 4000px at 100% 110%, rgba(0, 38, 255, 0), transparent 100%),
          linear-gradient(180deg, #000000, rgb(0, 6, 255));
      }
      body[data-theme="sunset"]{
        background:
          radial-gradient(1100px 650px at 18% 12%, rgba(69, 43, 25, 0), transparent 58%),
          radial-gradient(900px 540px at 88% 22%, rgba(124, 58, 237, 0), transparent 55%),
          radial-gradient(700px 460px at 60% 88%, rgba(34, 211, 238, 0), transparent 62%),
          linear-gradient(180deg, #000000, #000000);
      }
      body[data-theme="midnight"]{
        background:
          radial-gradient(1100px 650px at 25% 8%, rgba(255, 179, 0, 0), transparent 58%),
          radial-gradient(900px 540px at 85% 20%, rgba(153, 0, 255, 0.512), transparent 55%),
          radial-gradient(700px 460px at 65% 88%, rgba(0, 255, 136, 0), transparent 62%),
          linear-gradient(180deg, #000000, #7700ff5c);
      }
      body[data-theme="mono"]{
        background:
          radial-gradient(1100px 650px at 15% 10%, rgba(255,255,255,.10), transparent 58%),
          radial-gradient(900px 540px at 90% 18%, rgba(255,255,255,.08), transparent 55%),
          radial-gradient(700px 460px at 70% 90%, rgba(255,255,255,.06), transparent 62%),
          linear-gradient(180deg, #05060A, #0A0B12);
      }

      .app{min-height:100vh;padding:22px 18px 40px}
      .topbar{
        display:flex;align-items:center;justify-content:space-between;gap:14px;
        max-width:1280px;margin:0 auto 16px;
      }
      .brand{display:flex;align-items:center;gap:12px}
      .logo{
        width:42px;height:42px;border-radius:14px;
        background:
          radial-gradient(18px 18px at 30% 25%, rgba(255,255,255,.35), transparent 60%),
          linear-gradient(135deg, rgba(34,211,238,.95), rgba(52,211,153,.9));
        box-shadow:0 14px 40px rgba(34,211,238,.25);
        border:1px solid rgba(255,255,255,.22);
        position:relative;overflow:hidden;
      }
      .logo:after{
        content:"";position:absolute;top:-30%;left:-30%;width:120%;height:120%;
        background:conic-gradient(from 180deg, rgba(255,255,255,.0), rgba(255,255,255,.35), rgba(255,255,255,.0));
        transform:rotate(12deg);
        animation:spinGlow 5.5s linear infinite;opacity:.8;
      }
      @keyframes spinGlow{to{transform:rotate(372deg)}}
      .brand h1{margin:0;font-size:15px;letter-spacing:.2px;font-weight:750;line-height:1.1}
      .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}

      .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .pill{
        border:1px solid var(--stroke);
        background:rgba(255,255,255,.05);
        border-radius:999px;padding:10px 12px;
        display:flex;gap:10px;align-items:center;
        box-shadow:var(--shadow2);
        backdrop-filter:blur(10px);
      }
      .pill label{font-size:12px;color:var(--muted)}
      select{background:transparent;border:none;color:var(--text);outline:none;font-weight:650}
      option{background:#0b0d16}

      .btn{
        cursor:pointer;
        border:1px solid var(--stroke);
        background:rgba(255,255,255,.05);
        color:var(--text);
        padding:10px 12px;
        border-radius:12px;
        font-weight:720;
        transition:transform .15s ease, background .2s ease, border-color .2s ease;
        backdrop-filter:blur(10px);
        box-shadow:var(--shadow2);
        user-select:none;
      }
      .btn:hover{transform:translateY(-1px);border-color:var(--stroke2);background:rgba(255,255,255,.08)}
      .btn:active{transform:translateY(0px) scale(.99)}

      .navTop{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .navLink{
        text-decoration:none;
        color:var(--muted);
        border:1px solid rgba(255,255,255,.12);
        background:rgba(255,255,255,.03);
        padding:8px 10px;
        border-radius:12px;
        font-weight:700;
      }
      .navLink.active{color:var(--text);border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.10)}

      .grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:14px}
      .col{display:flex;flex-direction:column;gap:14px}

      .card{
        border-radius:var(--radius);
        background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
        border:1px solid rgba(255,255,255,.12);
        box-shadow:var(--shadow);
        backdrop-filter:blur(14px);
        overflow:hidden;
      }
      .card .hd{
        padding:14px 16px 10px;
        display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
        border-bottom:1px solid rgba(255,255,255,.08);
        background:rgba(255,255,255,.02);
      }
      .card .hd h2{margin:0;font-size:13px;letter-spacing:.25px;text-transform:uppercase;color:rgba(255,255,255,.84)}
      .card .hd .sub{margin-top:4px;font-size:12px;color:var(--muted)}
      .card .bd{padding:14px 16px 16px}

      .fadeIn{animation:fadeInUp .55s cubic-bezier(.2,.8,.2,1) both}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

      .notes{border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.16);padding:12px;display:flex;flex-direction:column;gap:10px}
      .notes .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
      .notes textarea{width:100%;min-height:190px;background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:var(--text);outline:none}
      .notes textarea:focus{border-color:rgba(34,211,238,.45);box-shadow:0 0 0 3px rgba(34,211,238,.15)}

      .status{display:flex;gap:10px;align-items:center;color:var(--muted);font-size:12px}
      .dot{width:9px;height:9px;border-radius:999px;background:rgba(255,255,255,.22);box-shadow:0 0 0 4px rgba(255,255,255,.06)}

      .note-list{display:flex;flex-direction:column;gap:10px}
      .note-item{border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);padding:10px}
      .note-item .head{display:flex;justify-content:space-between;gap:10px;align-items:center}
      .note-item .body{margin-top:6px;color:rgba(255,255,255,.78);font-size:12px;line-height:1.35}
      .smallbtn{border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);font-weight:820;cursor:pointer;transition:transform .12s ease, background .2s ease, border-color .2s ease}
      .smallbtn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.26);background:rgba(255,255,255,.10)}
      .smallbtn:active{transform:translateY(0px) scale(.99)}

      .toast{position:fixed;right:18px;bottom:18px;padding:12px 14px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:14px;box-shadow:var(--shadow);backdrop-filter:blur(10px);color:var(--text);transform:translateY(12px);opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;max-width:360px}
      .toast.show{opacity:1;transform:translateY(0)}

      .kbd{font-family:var(--mono);font-size:12px;padding:2px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05)}
      button:focus,input:focus,textarea:focus,select:focus{outline:none}
    </style>
  </head>

  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
<svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true" style="overflow:visible"><text x="32" y="46" text-anchor="middle" font-size="42">📝</text></svg>
          <div>
<h1>X-organization</h1>
            <p>Bloco de Notas</p>
          </div>
        </div>

        <div class="controls">
          <div class="pill">
            <label for="themeSel">Tema</label>
            <select id="themeSel" aria-label="Tema de fundo">
              <option value="aurora">Aurora</option>
              <option value="sunset">Sunset</option>
              <option value="midnight">Midnight</option>
              <option value="mono">Mono</option>
            </select>
          </div>

          <div class="navTop" aria-label="Navegação">
            <a class="btn" href="../index.html" style="text-decoration:none">🏠 Início</a>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="col">
          <section class="card fadeIn" style="animation-delay:0ms">
            <div class="hd">
              <div>
                <h2>Bloco de Notas</h2>
                <div class="sub">Autosalvamento • Busca • Historial local (últimos 12).</div>
              </div>
              <div class="seg"><div class="status">Status: <strong id="noteStatus">Pronto</strong><span class="dot" id="noteDot" style="margin-left:8px"></span></div></div>
            </div>

            <div class="bd">
              <div class="notes">
                <div class="top">
                  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    <input id="noteSearch" placeholder="Buscar dentro das notas…" style="background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;color:var(--text);outline:none;width:240px" />
                  </div>
                  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    <button class="btn" id="btnNoteClear">Limpar</button>
                    <button class="btn" id="btnNoteSave">Salvar snapshot</button>
                  </div>
                </div>

                <textarea id="noteArea" placeholder="Escreva aqui… (autosave funciona automaticamente)"></textarea>

                <div class="note-list" id="noteSnapshots"></div>
              </div>
            </div>
          </section>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <script>
      const $ = (sel, root=document) => root.querySelector(sel);

      function toast(msg, ms=1800){
        const el = $('#toast');
        if(!el) return;
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(()=>el.classList.remove('show'), ms);
      }

      const themeSel = $('#themeSel');
      function applyTheme(theme){
        document.body.dataset.theme = theme;
        try{ localStorage.setItem('bb_theme', theme); }catch{}
      }
      (function initTheme(){
        let t = 'aurora';
        try{ t = localStorage.getItem('bb_theme') || 'aurora'; }catch{}
        if(themeSel) themeSel.value = t;
        applyTheme(t);
      })();
      themeSel?.addEventListener('change', (e)=> applyTheme(e.target.value));

      const noteArea = $('#noteArea');
      const noteStatus = $('#noteStatus');
      const noteDot = $('#noteDot');
      const noteSearch = $('#noteSearch');
      const noteSnapshots = $('#noteSnapshots');

      // single user (account privacy removed)
      function nsKey(s){
        return `bb_notes__${s}`;
      }

      const noteStateKey = nsKey('notes');
      const noteSnapshotKey = nsKey('note_snapshots');
      const noteState = { content:'', snapshots:[] };
      let noteAutosaveTimer = null;

      function persistNotes(){
        try{
          localStorage.setItem(noteStateKey, noteState.content);
          localStorage.setItem(noteSnapshotKey, JSON.stringify(noteState.snapshots.slice(0,12)));
        }catch{}
      }
      function loadNotes(){
        try{
          const c = localStorage.getItem(noteStateKey);
          if(c!==null) noteState.content = c;
          const s = localStorage.getItem(noteSnapshotKey);
          if(s) noteState.snapshots = JSON.parse(s);
        }catch{}
      }

      function renderNoteSnapshots(filter=''){
        if(!noteSnapshots) return;
        noteSnapshots.innerHTML='';
        const filtered = noteState.snapshots.filter(s=>s.content.toLowerCase().includes(filter.toLowerCase()));
        if(filtered.length===0){
          const empty = document.createElement('div');
          empty.style.color='var(--muted)';
          empty.style.fontSize='12px';
          empty.textContent='Sem snapshots encontrados.';
          noteSnapshots.appendChild(empty);
          return;
        }
        filtered.forEach(s=>{
          const el = document.createElement('div');
          el.className='note-item';
          el.innerHTML=`
            <div class="head">
              <strong>${new Date(s.createdAt).toLocaleString()}</strong>
              <button class="smallbtn" title="Restaurar este snapshot">Restaurar</button>
            </div>
            <div class="body"></div>
          `;
          el.querySelector('.body').textContent = s.content.length > 240 ? s.content.slice(0,240)+'…' : s.content;
          el.querySelector('button').addEventListener('click', ()=>{
            const ok = confirm('Restaurar este snapshot? O conteúdo atual será perdido.');
            if(!ok) return;
            noteState.content = s.content;
            persistNotes();
            updateNotesUI();
            toast('Snapshot restaurado.');
          });
          noteSnapshots.appendChild(el);
        });
      }

      function updateNotesUI(){
        noteArea.value = noteState.content;
        renderNoteSnapshots(noteSearch.value);
      }

      noteArea.addEventListener('input', ()=>{
        noteState.content = noteArea.value;
        noteStatus.textContent = 'Digitando...';
        noteDot.style.backgroundColor = 'var(--yellow)';
        clearTimeout(noteAutosaveTimer);
        noteAutosaveTimer = setTimeout(()=>{
          persistNotes();
          noteStatus.textContent = 'Salvo';
          noteDot.style.backgroundColor = 'var(--green)';
          setTimeout(()=>{
            noteStatus.textContent = 'Pronto';
            noteDot.style.backgroundColor = 'rgba(255,255,255,.22)';
          }, 1500);
        }, 1000);
      });

      $('#btnNoteSave')?.addEventListener('click', ()=>{
        if(!noteState.content.trim()){
          toast('Não é possível salvar um snapshot vazio.');
          return;
        }
        noteState.snapshots.unshift({ content: noteState.content, createdAt: Date.now() });
        noteState.snapshots = noteState.snapshots.slice(0,12);
        persistNotes();
        renderNoteSnapshots(noteSearch.value);
        toast('Snapshot salvo.');
      });

      $('#btnNoteClear')?.addEventListener('click', ()=>{
        const ok = confirm('Limpar todo o conteúdo da nota? Esta ação não pode ser desfeita.');
        if(!ok) return;
        noteState.content = '';
        persistNotes();
        updateNotesUI();
        toast('Nota limpa.');
      });

      noteSearch.addEventListener('input', ()=> renderNoteSnapshots(noteSearch.value));

      loadNotes();
      updateNotesUI();
    </script>
  </body>
</html>

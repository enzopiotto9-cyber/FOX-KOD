<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
<title>X-organization • Chat</title>

    <style>
      :root{
        --bg0:#070A12;
        --bg1:#0B1630;
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.65);
        --stroke: rgba(255,255,255,.14);
        --stroke2: rgba(255,255,255,.22);
        --shadow: 0 18px 60px rgba(0,0,0,.55);
        --shadow2: 0 10px 30px rgba(0,0,0,.35);
        --radius: 18px;
        --radius2: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family:var(--sans);
        color:var(--text);
        background:
          radial-gradient(1200px 700px at 20% 10%, rgba(124,58,237,.35), transparent 60%),
          radial-gradient(900px 600px at 85% 20%, rgba(34,211,238,.28), transparent 55%),
          radial-gradient(700px 500px at 70% 90%, rgba(249,115,22,.18), transparent 60%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow-x:hidden;
      }
      body[data-theme="aurora"]{
        background:
          radial-gradient(1100px 650px at 15% 10%, rgba(0, 0, 0, 0), transparent 58%),
          radial-gradient(900px 540px at 90% 18%, rgba(47, 0, 255, 0), transparent 55%),
          radial-gradient(1000px 4000px at 100% 110%, rgba(0, 38, 255, 0), transparent 100%),
          linear-gradient(180deg, #000000, rgb(0, 6, 255));
      }
      body[data-theme="sunset"]{
        background:
          radial-gradient(1100px 650px at 18% 12%, rgba(69, 43, 25, 0), transparent 58%),
          radial-gradient(900px 540px at 88% 22%, rgba(124, 58, 237, 0), transparent 55%),
          radial-gradient(700px 460px at 60% 88%, rgba(34, 211, 238, 0), transparent 62%),
          linear-gradient(180deg, #000000, #000000);
      }
      body[data-theme="midnight"]{
        background:
          radial-gradient(1100px 650px at 25% 8%, rgba(255, 179, 0, 0), transparent 58%),
          radial-gradient(900px 540px at 85% 20%, rgba(153, 0, 255, 0.512), transparent 55%),
          radial-gradient(700px 460px at 65% 88%, rgba(0, 255, 136, 0), transparent 62%),
          linear-gradient(180deg, #000000, #7700ff5c);
      }
      body[data-theme="mono"]{
        background:
          radial-gradient(1100px 650px at 15% 10%, rgba(255,255,255,.10), transparent 58%),
          radial-gradient(900px 540px at 90% 18%, rgba(255,255,255,.08), transparent 55%),
          radial-gradient(700px 460px at 70% 90%, rgba(255,255,255,.06), transparent 62%),
          linear-gradient(180deg, #05060A, #0A0B12);
      }

      .app{min-height:100vh;padding:22px 18px 40px}
      .topbar{max-width:1280px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;gap:14px}
      .brand{display:flex;align-items:center;gap:12px}
      .logo{
        width:46px;height:46px;border-radius:16px;
        position:relative;overflow:hidden;
        background: radial-gradient(16px 16px at 30% 25%, rgba(255,255,255,.35), transparent 60%),
          linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,211,238,.9));
        box-shadow:0 14px 40px rgba(124,58,237,.35);
        border:1px solid rgba(255,255,255,.22);
      }
      .logo:after{
        content:"";position:absolute;top:-40%;left:-40%;width:140%;height:140%;
        background:conic-gradient(from 180deg, rgba(255,255,255,.0), rgba(255,255,255,.35), rgba(255,255,255,.0));
        transform:rotate(12deg);
        animation:spinGlow 5.5s linear infinite;opacity:.8;
      }
      @keyframes spinGlow{to{transform:rotate(372deg)}}

      .brand h1{margin:0;font-size:16px;letter-spacing:.2px;font-weight:950}
      .brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}

      .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
      .pill{border:1px solid var(--stroke);background:rgba(255,255,255,.05);border-radius:999px;padding:10px 12px;box-shadow:var(--shadow2);backdrop-filter:blur(10px);display:flex;gap:10px;align-items:center}
      .pill label{font-size:12px;color:var(--muted)}
      select{background:transparent;border:none;color:var(--text);outline:none;font-weight:650}
      option{background:#0b0d16}

      .navTop{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .navLink{color:var(--muted);text-decoration:none;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);padding:8px 10px;border-radius:12px;font-weight:750}
      .navLink.active{color:var(--text);border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.10)}

      .layout{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:14px}
      .card{
        border-radius:var(--radius);
        background:rgba(255,255,255,.04);
        border:1px solid rgba(255,255,255,.12);
        box-shadow:var(--shadow);
        backdrop-filter:blur(14px);
        overflow:hidden;
      }
      .card .hd{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
      .card .hd h2{margin:0;font-size:13px;letter-spacing:.25px;text-transform:uppercase;color:rgba(255,255,255,.84)}
      .card .bd{padding:14px 16px 16px}

      .chat{height: calc(100vh - 240px);display:flex;flex-direction:column}
      @media (max-width:760px){.chat{height: calc(100vh - 280px)}}

      .chatLog{flex:1;overflow:auto;padding:10px;border-radius:16px;background:rgba(0,0,0,.16);border:1px solid rgba(255,255,255,.10)}
      .chatLog::-webkit-scrollbar{width:10px}
      .chatLog::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:999px}

      .msgRow{display:flex;gap:10px;margin:10px 0;align-items:flex-end}
      .msgRow.user{justify-content:flex-end}
      .bubble{
        max-width:72%;
        border-radius:16px;
        padding:10px 12px;
        border:1px solid rgba(255,255,255,.12);
        background:rgba(255,255,255,.05);
        box-shadow:0 12px 40px rgba(0,0,0,.18);
        animation:popIn .18s ease both;
      }
      .msgRow.user .bubble{background:linear-gradient(135deg, rgba(124,58,237,.25), rgba(34,211,238,.12));border-color:rgba(34,211,238,.30)}
      @keyframes popIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      .bubble .meta{font-size:11px;color:rgba(255,255,255,.60);margin-bottom:6px}
      .bubble .text{font-size:13px;white-space:pre-wrap;word-break:break-word;line-height:1.35}

      .composer{margin-top:12px;display:flex;gap:10px;align-items:center}
      textarea{
        flex:1;
        resize:none;
        min-height:48px;
        max-height:140px;
        padding:12px 12px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,.12);
        background:rgba(0,0,0,.16);
        color:var(--text);
        outline:none;
        font-family:var(--sans);
      }
      textarea:focus{border-color:rgba(34,211,238,.45);box-shadow:0 0 0 3px rgba(34,211,238,.15)}

      .btn{cursor:pointer;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:12px 14px;border-radius:16px;font-weight:900;transition:transform .12s ease, background .2s ease, border-color .2s ease;user-select:none}
      .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.26);background:rgba(255,255,255,.10)}
      .btn:active{transform:translateY(0) scale(.99)}

      .toast{position:fixed;right:18px;bottom:18px;padding:12px 14px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:14px;box-shadow:var(--shadow);backdrop-filter:blur(10px);color:var(--text);transform:translateY(12px);opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;max-width:360px}
      .toast.show{opacity:1;transform:translateY(0)}

      button:focus,textarea:focus,select:focus{outline:none}
    </style>
  </head>

  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
<svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true" style="overflow:visible"><text x="32" y="46" text-anchor="middle" font-size="42">💬</text></svg>
          <div>
<h1>X-organization</h1>
            <p>Chatbot local</p>
          </div>
        </div>

        <div class="controls">
          <div class="pill">
            <label for="themeSel">Tema</label>
            <select id="themeSel" aria-label="Tema de fundo">
              <option value="aurora">Aurora</option>
              <option value="sunset">Sunset</option>
              <option value="midnight">Midnight</option>
              <option value="mono">Mono</option>
            </select>
          </div>
          <div class="navTop" aria-label="Navegação">
            <a class="btn" href="../index.html" style="text-decoration:none">🏠 Início</a>
          </div>
        </div>
      </div>

      <div class="layout">
        <div class="card">
          <div class="hd">
            <h2>Chat para usuários</h2>
            <div style="color:rgba(255,255,255,.65);font-size:12px">Sem internet • respostas do dia a dia</div>
          </div>
          <div class="bd">
            <div class="chat">
              <div class="chatLog" id="chatLog" aria-live="polite"></div>

              <div class="composer">
                <textarea id="chatInput" placeholder="Digite sua mensagem... (ex.: 'bom dia', 'que horas são', 'que dia é hoje', 'novidades')"></textarea>
                <button class="btn" id="chatSend">Enviar</button>
              </div>

              <div style="margin-top:10px;color:rgba(255,255,255,.65);font-size:12px;line-height:1.35">
                Dicas: Pergunte sobre seu dia, horas e calendário, ou peça um “plano rápido”.
              </div>

              <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px">
                <button class="btn" id="btnChatClear" title="Apaga histórico desta conversa">🧹 Limpar conversa</button>
                <div style="color:rgba(255,255,255,.55);font-size:12px">(apenas a conversa salva localmente)</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <script>
      const $ = (sel, root=document) => root.querySelector(sel);

      const themeSel = $('#themeSel');
      function applyTheme(theme){
        document.body.dataset.theme = theme;
        try{ localStorage.setItem('bb_theme', theme); }catch{}
      }
      (function initTheme(){
        let t = 'aurora';
        try{ t = localStorage.getItem('bb_theme') || 'aurora'; }catch{}
        if(themeSel) themeSel.value = t;
        applyTheme(t);
      })();
      themeSel?.addEventListener('change', (e)=> applyTheme(e.target.value));

      const chatLog = $('#chatLog');
      const chatInput = $('#chatInput');
      const chatSend = $('#chatSend');

      function escapeHtml(str){
        return String(str ?? '').replace(/[&<>"']/g, c=>({
          '&':'&amp;','<':'<','>':'>','"':'"',"'":'&#039;'
        })[c]);
      }

      function nowTime(){
        const d = new Date();
        return d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      }

      // single user (account privacy removed)
      const chatStoreKey = () => 'bb_chat';

      const state = { messages: [] };

      function persist(){
        try{ localStorage.setItem(chatStoreKey(), JSON.stringify(state.messages.slice(-80))); }catch{}
      }
      function load(){
        try{
          const raw = localStorage.getItem(chatStoreKey());
          if(raw) state.messages = JSON.parse(raw);
        }catch{}
      }

      function render(){
        if(!chatLog) return;
        chatLog.innerHTML='';
        state.messages.forEach(m=>{
          const row = document.createElement('div');
          row.className = 'msgRow ' + (m.role==='user' ? 'user' : 'bot');
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          bubble.innerHTML = `
            <div class="meta">${escapeHtml(m.role==='user'?'Você':'OrbiBot')} • ${escapeHtml(m.time || '')}</div>
            <div class="text">${escapeHtml(m.text)}</div>
          `;
          row.appendChild(bubble);
          chatLog.appendChild(row);
        });
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function botReply(userText){
        const t = String(userText ?? '').toLowerCase();
        const containsAny = (arr)=> arr.some(k=>t.includes(k));

        const d = new Date();
        const hour = d.getHours();

        // Saudação
        if(containsAny(['bom dia','bom dia!'])){
          return 'Bom dia! ☀️ Quer que eu te ajude a planejar o dia ou iniciar um foco rápido?';
        }
        if(containsAny(['boa tarde'])){
          return 'Boa tarde! 🌤️ Quer revisar suas tarefas ou preparar um timer agora?';
        }
        if(containsAny(['boa noite','boa noite!'])){
          return 'Boa noite! 🌙 Quer registrar uma nota ou definir um cronômetro para finalizar algo?';
        }

        // Horas
        if(containsAny(['que horas','hora','que horas são','que time','horas são'])){
          const time = d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
          return `Agora são ${time}.`;
        }

        // Dia de hoje
        if(containsAny(['que dia é hoje','que dia hoje','que dia é','hoje é'])){
          const dia = d.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
          return `Hoje é ${dia}.`;
        }

        // Novidades do dia (heurístico)
        if(containsAny(['novidades','o que tem de novo','o que há de novo','news'])){
          const greeting = hour < 12 ? 'pela manhã' : hour < 18 ? 'à tarde' : 'à noite';
          return [
'Novidades do seu X-organization (local):',
            `• ${greeting}: escolha 1 prioridade do dia e transforme em uma ação pequena.`,
            '• Se surgir algo importante, salve um snapshot nas Notas.',
            '• Quando quiser, inicie um timer de foco (ex.: 25 min).'
          ].join('\n');
        }

        // Planejamento/organização
        if(containsAny(['planejar','planejamento','tarefas','organizar','organização','prioridade'])){
          return [
'Plano rápido (5 passos):',
            '1) Liste 3 prioridades do dia.',
            '2) Transforme cada prioridade em uma ação pequena.',
            '3) Separe em “A Fazer / Em Progresso / Concluído”.',
            '4) Defina 1 ciclo de foco (ex.: 25 min) para começar.',
            '5) Revise no fim: o que concluir e o que pausar.'
          ].join('\n');
        }

        // Timer
        if(containsAny(['timer','cronometro','cronômetro','pausar','pausa'])){
          return [
            'Sugestão de uso do Timer:',
            '- Cronômetro: conte tempo sem meta (ex.: sessão de estudo).',
            '- Timer: defina o alvo (ex.: 00:10:00).',
            '- Atalho: use Espaço para pausar/recomeçar o cronômetro.'
          ].join('\n');
        }

        // Matemática (referência)
        if(containsAny(['calcular','conta','matem','multiplicar','somar','subtrair','dividir'])){
          return [
            'Posso te orientar: escreva a expressão e, se quiser, use a Calculadora do site.',
            'Ex.: 12*3+4'
          ].join('\n');
        }

        // Notas
        if(containsAny(['nota','notas','snapshot','salvar','autosave'])){
          return [
            'Notas (Bloco de Notas):',
            '- Autosave funciona enquanto você digita.',
            '- “Salvar snapshot” guarda versões.',
            '- A busca filtra por palavras.'
          ].join('\n');
        }

        // Privacidade
        if(containsAny(['privacidade','conta','usuario','usuário','login'])){
          return [
            'Privacidade por conta (modo local):',
            '- A conta na Home separa dados por usuário (namespace/localStorage).'
          ].join('\n');
        }

        return [
          'Entendi! Você pode perguntar:',
          '• bom dia / boa tarde / boa noite',
          '• que horas são',
          '• que dia é hoje',
          '• novidades',
          '• ou ajuda com tarefas, timer e notas.'
        ].join('\n');
      }

      function addMessage(role, text){
        state.messages.push({ role, text, time: nowTime() });
      }

      function send(){
        const v = (chatInput.value || '').trim();
        if(!v) return;
        addMessage('user', v);
        chatInput.value='';
        render();

        setTimeout(()=>{
          const reply = botReply(v);
          addMessage('bot', reply);
          render();
          persist();
        }, 180);

        persist();
      }

      chatSend?.addEventListener('click', send);
      chatInput?.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter' && !e.shiftKey){
          e.preventDefault();
          send();
        }
      });

      $('#btnChatClear')?.addEventListener('click', ()=>{
        const ok = confirm('Apagar toda a conversa desta conta?');
        if(!ok) return;
        state.messages = [];
        persist();
        render();
        toast('Conversa limpa.');
      });

      load();
      if(state.messages.length===0){
        addMessage('bot','Olá! Eu sou o OrbiBot. Pergunte: "bom dia", "que horas são", "que dia é hoje" ou "novidades".');
      }
      render();
      persist();
    </script>
  </body>
</html>
